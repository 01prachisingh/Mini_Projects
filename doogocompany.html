<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form </title>
    <link rel="stylesheet" href="form.css">
    <style>
        .error{
            color: red;
        }
    </style>
</head>
<body>
   <p>
    <img src="https://p1.hiclipart.com/preview/812/193/172/mlg-doge-png-clipart.jpg" >
   </p>
   <h2 align="center">!!!Doggo Company!!!</h2>
    <h1 align="center">Student Registration</h1>
    
    <form action="#" method="post" enctype="multipart/form-data">
    <label>Name:</label>
    <input type="text" name="name" id="name" required>
    <span id="nameError" class="error"></span>
    <br><br>
    <label>Email:</label>
    <input type="email" onblur="validateEmail()" id="email" >
    <br><br>
    <label>Password:</label>
    <input type="password">
    <br><br>
    <label> Gender:</label>
    <label>  <input type="radio" name="Gender" value="male">  male
    </label>
    <label>  <input type="radio" name="Gender" value="female">  female
    </label>
    <br><br>
    <label>Skills:</label>
    <label>
        <input type="checkbox"> HTML
    </label>
    <label>
        <input type="checkbox"> CSS
    </label>
    <label>
        <input type="checkbox">  Javascript
    </label>
    <br><br>
    <label>Course</label>
    <select name="Course" placeholder="select">
         <option value="select">SELECT</option>
        <option value="select">B.tech</option>
        <option value="select">M.tech</option>
        <option value="select">BBA</option>
    </select>
    <BR><BR>
       
    <label align="center">Address:</label>
    <textarea name="Address" rows="8" id="text"></textarea>
   <br><br>
    <input type="file" name="photo" accept="image/*" required>
        <br><br>
   <input type="file" name="CV" accept=".pdf ,.doc , .docx" required>
   <br><br>
   <input type="submit" value="register">
   <input type="reset" value="clear">
    </form>
</body>
</html>
